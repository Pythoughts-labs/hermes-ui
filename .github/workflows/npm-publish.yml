name: Publish to npm

# Publishes @pythoughts/hermes-ui to the npm registry. Fires on a version-tag
# push (the primary release path), on a published GitHub Release, or manually.
# Idempotent: if the version in package.json is already on npm, it skips.
#
# Required secret: NPM_TOKEN (an npm automation token with publish rights to the
# @pythoughts scope).

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/ref to publish from (e.g. v0.1.1)'
        required: false

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild node-pty

      - name: Build
        run: npm run build

      - name: Publish to npm (skip if version already published)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "::notice::${name}@${version} is already on npm — skipping publish."
            exit 0
          fi
          npm publish --access public
