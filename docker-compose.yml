services:
  hermes-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${UI_IMAGE:-hermes-ui-local:latest}
    container_name: ${UI_CONTAINER_NAME:-hermes-ui}
    ports:
      - "${PORT:-6060}:${PORT:-6060}"
      - "${PREVIEW_FRONTEND_PORT:-8651}:8651"
      - "${XAI_OAUTH_PORT:-56121}:56121"
    volumes:
      - ${HERMES_DATA_DIR:-./hermes_data}:/home/agent/.hermes
      - ${HERMES_DATA_DIR:-./hermes_data}/hermes-ui:/home/agent/.hermes-ui
    environment:
      - PORT=${PORT:-6060}
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_BIN=/opt/hermes/.venv/bin/hermes
      - HERMES_UI_MANAGED_GATEWAY=1
      - HERMES_UI_XAI_CALLBACK_BIND_HOST=0.0.0.0
      - PATH=/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - HERMES_ALLOW_ROOT_GATEWAY=1
    restart: unless-stopped
    stdin_open: true
    tty: true
